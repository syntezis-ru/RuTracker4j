name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.2)'
        required: true
        type: string

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected: X.Y.Z"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Update versions in pom.xml files
        run: |
          ./mvnw versions:set-property \
            -Dproperty=revision \
            -DnewVersion=${{ inputs.version }} \
            -DgenerateBackupPoms=false

          sed -i 's|<cronctl.version>.*</cronctl.version>|<cronctl.version>${{ inputs.version }}</cronctl.version>|' \
            sample-app/pom.xml

      - name: Build and verify
        run: ./mvnw clean verify -Dgpg.skip=true

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml sample-app/pom.xml
          if git diff --staged --quiet; then
            echo "Version already set to ${{ inputs.version }}, skipping commit"
          else
            git commit -m "Release v${{ inputs.version }}"
            git push
          fi

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --latest