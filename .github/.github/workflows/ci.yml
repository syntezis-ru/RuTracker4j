name: CI

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  version-check:
    name: Version Sync Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check cronctl version sync
        run: |
          ROOT_VERSION=$(grep -m1 '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/' | tr -d '[:space:]')
          SAMPLE_VERSION=$(grep -m1 '<cronctl.version>' sample-app/pom.xml | sed 's/.*<cronctl.version>\(.*\)<\/cronctl.version>.*/\1/' | tr -d '[:space:]')

          echo "Root pom.xml revision:       $ROOT_VERSION"
          echo "sample-app cronctl.version:  $SAMPLE_VERSION"

          if [ "$ROOT_VERSION" != "$SAMPLE_VERSION" ]; then
            echo "::error::Version mismatch — root pom.xml revision ($ROOT_VERSION) != sample-app cronctl.version ($SAMPLE_VERSION)"
            exit 1
          fi

          echo "Versions match: $ROOT_VERSION"

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: version-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: ./mvnw clean verify -Dgpg.skip=true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          min-coverage-overall: 40
          min-coverage-changed-files: 50

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
